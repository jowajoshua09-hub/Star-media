<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Star Media</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{--bg:#08080a;--card:#141416;--muted:#8a8a90;--line:#1e1e22;--acc:#a855f7}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system}
body{background:var(--bg);color:#fff;min-height:100vh;padding-bottom:108px}
.header{position:sticky;top:0;z-index:20;background:rgba(8,8,10,.88);backdrop-filter:blur(22px) saturate(180%);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
.logo{display:flex;align-items:center;gap:10px;font-weight:900;font-size:18px;letter-spacing:-.2px}
.logo-icon{width:36px;height:36px;background:#fff;border-radius:11px;display:grid;place-items:center;box-shadow:0 1px 0 rgba(255,255,255,.2) inset}
.logo-icon svg{width:20px;height:20px}
.header-actions{display:flex;gap:8px}
.top-btn{width:38px;height:38px;border-radius:12px;background:#17171a;border:1px solid #25252a;display:grid;place-items:center;cursor:pointer}
.top-btn svg{width:18px;height:18px;stroke:#fff;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

.search-wrap{padding:14px 16px 10px;position:sticky;top:64px;z-index:10;background:var(--bg)}
.search{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid #232326;border-radius:16px;padding:6px 6px 6px 14px;transition:.2s}
.search:focus-within{border-color:#2f2f35;background:#18181b}
.search input{flex:1;background:transparent;border:0;color:#fff;font-size:15px;outline:none}
.search input::placeholder{color:#5a5a60}
.s-icon{width:18px;height:18px;stroke:#5a5a60;fill:none;stroke-width:1.8;flex-shrink:0}
.search-btn{width:40px;height:40px;border-radius:11px;border:0;background:#fff;display:grid;place-items:center;cursor:pointer;transition:.15s}
.search-btn:active{scale:.93}
.search-btn svg{width:18px;height:18px;stroke:#000;stroke-width:2;fill:none;stroke-linejoin:round}

.pills{display:flex;gap:8px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:7px 12px;border-radius:999px;background:#18181b;border:1px solid #25252a;font-size:12px;font-weight:600;cursor:pointer;color:#b5b5bb;transition:.2s}
.pill:active{scale:.96}

.results{padding:6px 16px}
.card{display:flex;gap:12px;background:var(--card);border:1px solid #1e1e22;border-radius:18px;padding:12px;margin-bottom:10px}
.thumb{width:110px;height:64px;border-radius:12px;object-fit:cover;background:#1a1a1e;flex-shrink:0}
.title{font-weight:650;font-size:13.2px;line-height:1.32;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.meta{font-size:11px;color:var(--muted);margin-top:4px}
.chips{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.chip{padding:7px 11px;border-radius:999px;font-size:11.5px;font-weight:700;border:1px solid #2a2a2e;background:#1e1e22;color:#e6e6e6;cursor:pointer}
.chip.mp3{color:#22c55e;background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.22)}
.chip.mp4{color:#8ab4ff;background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.2)}

.empty{text-align:center;padding:56px 20px;border:1px dashed #25252a;border-radius:20px;background:#101012}
.empty b{font-size:15px}.empty p{font-size:12.5px;color:var(--muted);margin-top:6px;line-height:1.5}
.retry{margin-top:14px;padding:10px 16px;border-radius:999px;border:0;background:#fff;color:#000;font-weight:700;cursor:pointer}

#toast{position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-8px);background:#1c1c20;border:1px solid #2a2a30;padding:11px 14px;border-radius:14px;font-size:12.5px;font-weight:600;opacity:0;pointer-events:none;transition:.28s;z-index:100;max-width:90vw;box-shadow:0 10px 30px rgba(0,0,0,.5)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.view{display:none}.view.active{display:block}
.bar{height:5px;background:#1e1e22;border-radius:999px;overflow:hidden;margin:10px 0}
.bar>div{height:100%;background:#fff;transition:width .3s;border-radius:999px}
.row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.btn-main{width:100%;margin-top:10px;padding:13px;border-radius:12px;border:0;background:#fff;color:#000;font-weight:800;font-size:13px;cursor:pointer}

/* PRO TAB BAR - CLEAN */
.tabbar{position:fixed;bottom:12px;left:12px;right:12px;z-index:30;background:rgba(22,22,24,.92);backdrop-filter:blur(24px) saturate(180%);border:1px solid #2a2a30;border-radius:22px;padding:5px;display:flex;box-shadow:0 12px 40px rgba(0,0,0,.65), inset 0 1px 0 rgba(255,255,255,.06)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border-radius:15px;cursor:pointer;transition:.22s;color:#6f6f78;font-size:10px;font-weight:700;letter-spacing:.2px;position:relative}
.tab svg{width:20px;height:20px;stroke-width:1.9;fill:none;stroke:currentColor;transition:.22s}
.tab.active{background:#fff;color:#000;box-shadow:0 4px 14px rgba(255,255,255,.18)}
.tab.active svg{stroke:#000}
.dot{position:absolute;top:7px;right:32%;width:5px;height:5px;background:#a855f7;border-radius:50%;display:none;box-shadow:0 0 0 2px #161618}
.dot.show{display:block}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><div class="logo-icon"><svg viewBox="0 0 100 100"><path d="M50 12 L60.6 38.4 L87 50 L60.6 61.6 L50 88 L39.4 61.6 L13 50 L39.4 38.4 Z" fill="black"/></svg></div><span>Star Media</span></div>
  <div class="header-actions">
    <button class="top-btn" onclick="switchTab('downloads')" aria-label="Downloads">
      <svg viewBox="0 0 24 24"><path d="M12 3v12"/><path d="M7.5 10.5L12 15l4.5-4.5"/><path d="M3.5 17.5V19a1.5 1.5 0 0 0 1.5h14A1.5 0 0 0 20.5 19v-1.5"/></svg>
    </button>
  </div>
</div>

<div id="toast"></div>

<div id="view-search" class="view active">
  <div class="search-wrap">
    <div class="search">
      <svg class="s-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="6.2"/><path d="M16.2 16.2L20 20"/></svg>
      <input id="q" placeholder="Search songs, videos..." enterkeyhint="search" onkeydown="if(event.key==='Enter')doSearch()">
      <button class="search-btn" onclick="doSearch()" aria-label="Search">
        <svg viewBox="0 0 24 24"><path d="M5 12L19 5L12 19L10 13L5 12Z" stroke-linejoin:round/></svg>
      </button>
    </div>
  </div>
  <div class="pills" id="pills"></div>
  <div id="results" class="results"><div class="empty"><b>Search anything</b><p>Songs → <code>gojo.mp3</code> as document<br>Videos → 480p / 720p / 1080p</p></div></div>
</div>

<div id="view-downloads" class="view">
  <div style="padding:18px 16px 6px"><h2 style="font-size:20px;font-weight:900;letter-spacing:-.3px">Downloads</h2><p style="font-size:12px;color:var(--muted);margin-top:4px">Live speed, ETA and progress</p></div>
  <div id="dl-list" class="results"></div>
</div>

<div id="view-recent" class="view">
  <div style="padding:18px 16px 6px;display:flex;justify-content:space-between;align-items:center"><h2 style="font-size:20px;font-weight:900;letter-spacing:-.3px">Recent</h2><button onclick="clearAll()" style="background:#1a1a1e;border:1px solid #2a2a30;color:#aaa;padding:7px 12px;border-radius:999px;font-size:11px;font-weight:700">Clear</button></div>
  <div id="recent-list" class="results"></div>
</div>

<nav class="tabbar">
  <div class="tab active" id="tab-search" onclick="switchTab('search')"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="5.2"/><path d="M15.8 15.8L19 19"/></svg>Search<span class="dot" id="dot-s"></span></div>
  <div class="tab" id="tab-downloads" onclick="switchTab('downloads')"><svg viewBox="0 0 24 24"><path d="M12 4v10"/><path d="M8 10l4 4 4-4"/><path d="M4 16v1.5A1.5 1.5 0 0 0 5.5 19h13A1.5 1.5 0 0 0 20 17.5V16"/></svg>Downloads<span class="dot" id="dot-d"></span></div>
  <div class="tab" id="tab-recent" onclick="switchTab('recent')"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7.5"/><path d="M12 8v4l2.5 1.6"/></svg>Recent<span class="dot" id="dot-r"></span></div>
</nav>

<script>
const tg=Telegram.WebApp; tg.expand(); tg.enableClosingConfirmation();
const API_MP3="https://blacknodezw.zone.id/api/youtube/mp3";
const API_MP4="https://blacknodezw.zone.id/api/youtube/mp4";
let downloads=JSON.parse(localStorage.getItem('star_dls')||'[]').slice(0,20);
let recents=JSON.parse(localStorage.getItem('star_recent')||'[]');
let favs=JSON.parse(localStorage.getItem('star_favs')||'[]');

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);try{tg.HapticFeedback.notificationOccurred('error')}catch{}}
function ok(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.borderColor='#22c55e44';t.classList.add('show');setTimeout(()=>{t.classList.remove('show');t.style.borderColor='#2a2a30'},2500)}

function switchTab(n){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='recent') renderRecent();
  if(n==='downloads') renderDL();
  try{tg.HapticFeedback.selectionChanged()}catch{}
}

function renderPills(){
  const el=document.getElementById('pills'); let h='';
  if(favs.length) h+=`<span class="pill" style="color:#ff7ab8;border-color:#ff7ab82a;background:#ff7ab814" onclick="switchTab('recent')">❤️ ${favs.length} Saved</span>`;
  recents.slice(0,7).forEach(r=>h+=`<span class="pill" onclick="qFill('${r.replace(/'/g,"\\'")}')">${r}</span>`);
  if(!h) h=`<span class="pill" style="opacity:.45;pointer-events:none">Recent searches appear here</span>`;
  el.innerHTML=h;
}
function qFill(v){document.getElementById('q').value=v;doSearch()}
function saveRecent(q){recents=[q,...recents.filter(x=>x!==q)].slice(0,12);localStorage.setItem('star_recent',JSON.stringify(recents));renderPills()}

async function doSearch(){
  const q=document.getElementById('q').value.trim(); if(!q){toast('Type something to search');return}
  if(!navigator.onLine){toast('You are offline. Check connection');return}
  saveRecent(q);
  document.getElementById('results').innerHTML=`<div style="text-align:center;padding:36px;opacity:.6;font-size:13px">Searching <b>${q}</b>...</div>`;
  try{
    const r=await fetch(`https://iv.gg/api/v1/search?q=${encodeURIComponent(q)}&type=video`,{signal:AbortSignal.timeout(12000)});
    if(!r.ok) throw new Error('search '+r.status);
    const data=await r.json(); let html='';
    data.slice(0,14).forEach(v=>{ if(v.type!=="video") return; const safe=v.title.replace(/'/g,"\\'"); const dur=`${Math.floor((v.lengthSeconds||0)/60)}:${String((v.lengthSeconds||0)%60).padStart(2,'0')}`;
      html+=`<div class="card"><img class="thumb" loading="lazy" src="https://i.ytimg.com/vi/${v.videoId}/hqdefault.jpg"><div style="flex:1;min-width:0"><div class="title">${v.title}</div><div class="meta">${v.author||'YouTube'} • ${dur}</div><div class="chips"><button class="chip mp3" onclick="startDL('${v.videoId}','${safe}','mp3','320k')">🎵 gojo.mp3</button><button class="chip mp4" onclick="toggleQ('${v.videoId}')">🎬 MP4</button><button class="chip" onclick="toggleFav('${v.videoId}','${safe}','${v.author||''}')">🤍</button></div><div id="q-${v.videoId}" style="display:none" class="chips"><button class="chip" onclick="startDL('${v.videoId}','${safe}','mp4','480p')">480p</button><button class="chip" onclick="startDL('${v.videoId}','${safe}','mp4','720p')">720p HD</button><button class="chip" style="background:#fff;color:#000;border-color:#fff" onclick="startDL('${v.videoId}','${safe}','mp4','1080p')">1080p FHD</button></div></div></div>`;
    });
    document.getElementById('results').innerHTML=html||`<div class="empty"><b>No results</b><p>Try another spelling or paste a YouTube link</p><button class="retry" onclick="doSearch()">Retry</button></div>`;
  }catch(e){ console.log(e); document.getElementById('results').innerHTML=`<div class="empty"><b>Search failed</b><p>Check internet or try again</p><button class="retry" onclick="doSearch()">🔄 Retry</button></div>`; if(!navigator.onLine) toast('You are offline'); else toast('Search is slow, tap Retry'); }
}
function toggleQ(id){const el=document.getElementById('q-'+id); el.style.display=el.style.display==='none'?'flex':'none'}
function toggleFav(id,t,a){const i=favs.findIndex(f=>f.id===id); if(i>=0){favs.splice(i,1); toast('Removed')} else {favs.unshift({id,title:t,author:a}); ok('Saved to Recent')} localStorage.setItem('star_favs',JSON.stringify(favs)); renderPills();}

function renderRecent(){
  const c=document.getElementById('recent-list'); if(!recents.length && !favs.length){c.innerHTML=`<div class="empty"><b>Nothing yet</b><p>Searches and saved items appear here</p></div>`;return;}
  let h=''; if(favs.length){ h+=`<div style="font-size:10px;letter-spacing:.6px;color:#777;margin:4px 0 10px">SAVED</div>`; favs.forEach(v=>{h+=`<div class="card"><img class="thumb" src="https://i.ytimg.com/vi/${v.id}/hqdefault.jpg"><div style="flex:1;min-width:0"><div class="title">${v.title}</div><div class="chips"><button class="chip mp3" onclick="startDL('${v.id}','${v.title.replace(/'/g,'')}','mp3','320k')">gojo.mp3</button><button class="chip" onclick="toggleFav('${v.id}');renderRecent();renderPills()">Remove</button></div></div></div>`})}
  h+=`<div style="font-size:10px;letter-spacing:.6px;color:#777;margin:18px 0 10px">RECENT SEARCHES</div>`; recents.forEach(r=>{h+=`<div class="card" style="align-items:center;cursor:pointer" onclick="qFill('${r.replace(/'/g,"\\'")}')"><div style="width:36px;height:36px;border-radius:50%;background:#1c1c1f;display:grid;place-items:center;font-size:14px">🕒</div><div style="flex:1;margin-left:10px"><div style="font-weight:600;font-size:13px">${r}</div><div class="meta">Tap to search again</div></div><div style="opacity:.4">›</div></div>`});
  c.innerHTML=h;
}
function clearAll(){recents=[];favs=[];localStorage.removeItem('star_recent');localStorage.removeItem('star_favs');renderRecent();renderPills();ok('Cleared')}

function renderDL(){
  const c=document.getElementById('dl-list'); if(!downloads.length){c.innerHTML=`<div class="empty"><b>No downloads</b><p>Your downloads with live speed and ETA show here</p></div>`;return;}
  c.innerHTML=downloads.map(d=>`<div style="background:#141416;border:1px solid #1f1f23;border-radius:16px;padding:12px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;gap:8px"><b style="font-size:12.5px;max-width:170px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.title}</b><span style="font-size:10px;color:#888">${d.type.toUpperCase()} • ${d.quality}</span></div><div class="bar"><div style="width:${d.progress}%;${d.error?'background:#ef4444':''}"></div></div><div class="row"><span>⚡ ${d.speed}</span><span>⏱ ${d.eta}</span><span>${Math.round(d.progress)}%</span></div>${d.done?`<button class="btn-main" onclick="sendTG('${d.dl}','${d.type}','${d.quality}','${d.title.replace(/'/g,'')}')">⬇️ Send to Telegram</button>`:d.error?`<button class="btn-main" style="background:#ef4444;color:#fff" onclick="retryDL(${d.id})">🔄 Retry Download</button><div style="font-size:11px;color:#ff9a9a;text-align:center;margin-top:6px">Tap to retry, your place is saved</div>`:`<button class="btn-main" disabled style="opacity:.6">Downloading from BlackNode...</button>`}</div>`).join('');
}

async function startDL(id,title,type,quality){
  if(!navigator.onLine){toast('You are offline');return}
  const item={id:Date.now(),ytId:id,title,type,quality,progress:0,speed:'0 MB/s',eta:'--',done:false,dl:null,error:false};
  downloads.unshift(item); localStorage.setItem('star_dls',JSON.stringify(downloads.slice(0,20))); document.getElementById('dot-d').classList.add('show'); renderDL(); switchTab('downloads');
  let prog=0; const iv=setInterval(()=>{if(prog>=88||item.error||item.done)return; prog+=Math.random()*6; item.progress=Math.min(88,prog); item.speed=(Math.random()*1.6+0.6).toFixed(1)+' MB/s'; item.eta=Math.floor(Math.random()*9+2)+'s'; renderDL()},380);
  try{
    const api=type==='mp3'?API_MP3:API_MP4; const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),45000);
    const res=await fetch(api,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:`https://www.youtube.com/watch?v=${id}`,quality}),signal:ctrl.signal});
    clearTimeout(to); if(!res.ok){const t=await res.text(); throw new Error(`HTTP ${res.status} ${t.slice(0,60)}`)} const j=await res.json(); const dl=j.url||j.downloadUrl||j.link||j.data?.url; if(!dl) throw new Error('No link');
    clearInterval(iv); item.progress=100; item.speed='Ready'; item.eta='Done'; item.done=true; item.dl=dl; localStorage.setItem('star_dls',JSON.stringify(downloads)); renderDL(); ok('Ready to send!');
  }catch(e){ clearInterval(iv); item.error=true; item.speed='Failed'; item.eta='Tap Retry'; localStorage.setItem('star_dls',JSON.stringify(downloads)); renderDL(); if(String(e).includes('AbortError')||String(e).includes('aborted')) toast('Server is slow, tap Retry'); else if(!navigator.onLine) toast('You went offline'); else if(String(e).includes('No link')) toast('Video is private or age-restricted'); else toast('Download failed, tap Retry'); }
}
function retryDL(ts){ const it=downloads.find(d=>d.id===ts); if(it){ const {ytId,title,type,quality}=it; downloads=downloads.filter(d=>d.id!==ts); startDL(ytId,title,type,quality);} }
function sendTG(dl,type,q,t){ if(!dl){toast('Link expired, retry download');return;} tg.sendData(JSON.stringify({dl_url:dl,type,quality:q,title:t})); ok('Sending to Telegram...'); }

renderPills(); renderDL();
</script>
</body>
  </html>
