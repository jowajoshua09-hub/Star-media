services:
    - type: web
    name: star-media-bot
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
            - key: BOT_TOKEN
        sync: false
    healthCheckPath: /

    - type: static
    name: star-media-app
    staticPublishPath: ./app
    routes:
            - type: rewrite
        source: /*
        destination: /index.html